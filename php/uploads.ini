; Portal Martiano — Configuración PHP personalizada
; ══════════════════════════════════════════════════

; Límites de subida de archivos
upload_max_filesize = 64M
post_max_size = 64M

; Memoria y tiempo de ejecución
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; Manejo de errores (desarrollo)
display_errors = On
error_reporting = E_ALL
